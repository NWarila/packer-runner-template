name: Release

# NEGATIVE fixture: a runner release.yaml that wrongly hides release automation
# in LOCAL reusable workflows instead of calling the org-owned release-please
# (NWarila/.github) and the framework-owned release-evidence
# (NWarila/packer-framework-template) reusables by immutable SHA. The contract's
# release.yaml content-rules must reject this. See AUDIT-2026-05-28 / finding S1.

on:
  workflow_dispatch:
    inputs:
      task:
        required: true
        type: choice
        default: release-please
        options:
          - release-please
          - release-evidence

permissions:
  contents: read

jobs:
  release-please:
    if: ${{ inputs.task == 'release-please' }}
    uses: ./.github/workflows/reusable-release-please.yaml

  evidence:
    if: ${{ inputs.task == 'release-evidence' }}
    uses: ./.github/workflows/reusable-release-evidence.yaml
