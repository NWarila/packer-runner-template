name: Drift Gate

# Verifies the template mirrors the org-baseline files from NWarila/.github
# byte-identically. The template-tier baseline (NWarila/packer-runner-template
# itself) is added once this template's baseline-manifest grows beyond stub
# in a subsequent PR.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

concurrency:
  group: drift-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  org-baseline:
    name: org-baseline / verify
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Drift gate (org baseline)
        # renovate: datasource=git-refs depName=NWarila/drift-gate
        uses: NWarila/drift-gate@a29b46ba971b55956994d51684c44d6861f7b4bf # main @ 2026-05-11
        with:
          source-repo: NWarila/.github
          # renovate: depName=NWarila/.github packageName=NWarila/.github currentValue=main
          source-ref: e7456b0219e8750fbef8bd70a0f1ccf7d47f1c20 # slimmed manifest: reusables called not mirrored (.github #14)
          manifest: baseline-manifest.json
          check-name: org-baseline / verify
