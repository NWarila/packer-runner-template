name: Repo Hygiene

# Single visible entrypoint for the org-wide repo-hygiene policy. Delegates to
# the org-owned reusable, which evaluates NWarila/.github's repo_hygiene.rego
# (SHA-pinned uses:, exact dependency pins where applicable, pull_request_target
# safety) against this repo's checked-out tree. No local policy file or
# input-builder is mirrored here - the reusable sources both from
# NWarila/.github at source_ref.

on:
  pull_request:
    branches: [main]
  merge_group:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: repo-hygiene-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  hygiene:
    name: repo-hygiene
    permissions:
      contents: read
    uses: NWarila/.github/.github/workflows/reusable-repo-hygiene.yaml@e7456b0219e8750fbef8bd70a0f1ccf7d47f1c20
    with:
      source_ref: e7456b0219e8750fbef8bd70a0f1ccf7d47f1c20
