name: Reusable Release Evidence

# Generates and attaches a uniform evidence bundle to every release in
# framework, runner, and template repositories that consume this Packer
# template family.
#
# Type-aware behavior:
# - framework: runs Packer fmt/init/validate/inspect, plugin provenance,
#   artifact OPA policy, docs layout, and reference snapshots.
# - runner: captures packer/repos inventory and the pinned framework_ref used
#   by the runner workflow. It does not install or run Packer.
# - template: runner-shaped evidence for the seed runner template.

on:
  workflow_call:
    inputs:
      packer_version:
        description: |
          Exact Packer version used for framework evidence. Runner and
          template repos ignore this input.
        required: true
        type: string
      repo_type:
        description: |
          Explicit repo type for release evidence: framework, runner, or template.
        required: true
        type: string

permissions:
  contents: read

jobs:
  evidence:
    name: Build release evidence
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      attestations: write
      contents: write
      id-token: write
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository at release SHA
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Validate repo type
        id: type
        env:
          REPO_TYPE: ${{ inputs.repo_type }}
        run: |
          set -euo pipefail
          t="${REPO_TYPE}"
          case "$t" in
            framework|runner|template) ;;
            *)
              echo "::error::unknown repo type '$t' (expected framework, runner, or template)"
              exit 1
              ;;
          esac
          echo "type=$t" >> "$GITHUB_OUTPUT"
          echo "repo type: $t"

      - name: Install Packer
        if: steps.type.outputs.type == 'framework'
        # renovate: datasource=github-releases depName=hashicorp/packer extractVersion=^v(?<version>.*)$
        env:
          PACKER_VERSION: ${{ inputs.packer_version }}
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          trap 'rm -rf "$workdir"' EXIT
          zip="packer_${PACKER_VERSION}_linux_amd64.zip"
          sums="packer_${PACKER_VERSION}_SHA256SUMS"
          base="https://releases.hashicorp.com/packer/${PACKER_VERSION}"
          curl --fail --silent --show-error --location -o "$workdir/$zip" "$base/$zip"
          curl --fail --silent --show-error --location -o "$workdir/$sums" "$base/$sums"
          expected="$(awk -v f="$zip" '$2 == f {print $1}' "$workdir/$sums")"
          actual="$(sha256sum "$workdir/$zip" | awk '{print $1}')"
          if [ -z "$expected" ] || [ "$actual" != "$expected" ]; then
            echo "::error::Packer SHA256 verification failed"
            echo "expected: $expected"
            echo "actual:   $actual"
            exit 1
          fi
          unzip -q "$workdir/$zip" -d "$workdir/packer"
          install -m 0755 "$workdir/packer/packer" /usr/local/bin/packer
          packer version

      - name: Install OPA
        if: steps.type.outputs.type == 'framework'
        # renovate: datasource=github-releases depName=open-policy-agent/opa
        env:
          OPA_VERSION: "1.10.0"
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          trap 'rm -rf "$workdir"' EXIT
          bin="opa_linux_amd64_static"
          base="https://github.com/open-policy-agent/opa/releases/download/v${OPA_VERSION}"
          curl --fail --silent --show-error --location -o "$workdir/$bin" "$base/$bin"
          curl --fail --silent --show-error --location -o "$workdir/$bin.sha256" "$base/$bin.sha256"
          expected="$(awk '{print $1}' "$workdir/$bin.sha256")"
          actual="$(sha256sum "$workdir/$bin" | awk '{print $1}')"
          if [ -z "$expected" ] || [ "$actual" != "$expected" ]; then
            echo "::error::OPA SHA256 verification failed"
            echo "expected: $expected"
            echo "actual:   $actual"
            exit 1
          fi
          install -m 0755 "$workdir/$bin" /usr/local/bin/opa
          opa version

      - name: Setup Python
        if: steps.type.outputs.type == 'framework'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Generate framework evidence
        if: steps.type.outputs.type == 'framework'
        env:
          OUT: release-evidence
        run: |
          set -euo pipefail
          mkdir -p "$OUT"/{logs,validate,inspect,plugins,docs,reference,policy}
          : > "$OUT/.gate-results.tsv"

          record() {
            printf '%s\t%s\t%s\n' "$1" "$2" "$3" >> "$OUT/.gate-results.tsv"
          }

          if packer fmt -check -recursive packer examples > "$OUT/logs/packer-fmt.txt" 2>&1; then
            record "packer fmt" pass "logs/packer-fmt.txt"
          else
            record "packer fmt" fail "logs/packer-fmt.txt"
          fi

          if packer init packer > "$OUT/logs/packer-init.txt" 2>&1; then
            record "packer init" pass "logs/packer-init.txt"
          else
            record "packer init" fail "logs/packer-init.txt"
          fi

          if python3 tools/check_packer_plugin_provenance.py --installed --upstream --evidence "$OUT/plugins/packer-plugin-provenance.json" > "$OUT/plugins/packer-plugin-provenance.txt" 2>&1; then
            record "packer plugin provenance" pass "plugins/packer-plugin-provenance.json"
          else
            record "packer plugin provenance" fail "plugins/packer-plugin-provenance.txt"
          fi

          if [ -f packer/plugin-provenance.json ]; then
            cp packer/plugin-provenance.json "$OUT/plugins/plugin-provenance.lock.json"
          fi

          if packer validate -machine-readable -var-file examples/linux/reference-linux.pkrvars.hcl packer > "$OUT/validate/packer.validate.tsv" 2> "$OUT/logs/packer-validate.stderr.txt"; then
            record "packer validate" pass "validate/packer.validate.tsv"
          else
            record "packer validate" fail "validate/packer.validate.tsv"
          fi

          if packer inspect -machine-readable packer > "$OUT/inspect/packer.inspect.tsv" 2> "$OUT/logs/packer-inspect.stderr.txt"; then
            record "packer inspect" pass "inspect/packer.inspect.tsv"
          else
            record "packer inspect" fail "inspect/packer.inspect.tsv"
          fi

          if python3 tools/verify.py opa-artifact > "$OUT/policy/opa-artifact.txt" 2>&1; then
            record "opa artifact" pass "policy/opa-artifact.txt"
          else
            record "opa artifact" fail "policy/opa-artifact.txt"
            {
              echo "## opa-artifact failure"
              echo ""
              sed 's/^/    /' "$OUT/policy/opa-artifact.txt"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -f tools/check_docs_layout.py ]; then
            if python3 tools/check_docs_layout.py > "$OUT/docs/docs-layout.txt" 2>&1; then
              record "docs layout" pass "docs/docs-layout.txt"
            else
              record "docs layout" fail "docs/docs-layout.txt"
            fi
          fi

          if [ -f docs/reference/packer.md ]; then
            cp docs/reference/packer.md "$OUT/reference/packer.md"
            record "packer reference" pass "reference/packer.md"
          fi

          {
            echo "release_sha=${GITHUB_SHA}"
            echo "release_ref=${GITHUB_REF}"
            echo "repository=${GITHUB_REPOSITORY}"
            echo "run_id=${GITHUB_RUN_ID}"
          } > "$OUT/metadata.txt"

      - name: Generate runner/template evidence
        if: steps.type.outputs.type == 'runner' || steps.type.outputs.type == 'template'
        env:
          OUT: release-evidence
          REPO_TYPE: ${{ steps.type.outputs.type }}
        run: |
          set -euo pipefail
          mkdir -p "$OUT"/{packer/repos,packer/fixtures,workflows}
          echo "${REPO_TYPE}" > "$OUT/repo-type.txt"

          if [ -d packer/repos ]; then
            (cd packer/repos && find . -type f | sort) > "$OUT/packer/repos/inventory.txt"
            tar -C packer/repos -czf "$OUT/packer/repos/snapshot.tar.gz" .
          else
            echo "packer/repos missing" > "$OUT/packer/repos/inventory.txt"
          fi

          if [ -d packer/fixtures/runtime ]; then
            (cd packer/fixtures/runtime && find . -type f | sort) > "$OUT/packer/fixtures/runtime-inventory.txt"
          else
            echo "packer/fixtures/runtime missing" > "$OUT/packer/fixtures/runtime-inventory.txt"
          fi

          workflow_files=()
          if [ -d .github/workflows ]; then
            while IFS= read -r -d '' file; do
              workflow_files+=( "$file" )
            done < <(find .github/workflows -maxdepth 1 -type f \( -name '*.yaml' -o -name '*.yml' \) -print0)
          fi

          if ((${#workflow_files[@]})); then
            grep -EH '^\s*framework_ref:\s*[0-9a-f]{40}(\s*(#.*)?)?$' "${workflow_files[@]}" \
              > "$OUT/workflows/framework-ref.txt" || echo "no pinned framework_ref found" > "$OUT/workflows/framework-ref.txt"
            grep -EH 'reusable-packer-framework-build\.yaml@[0-9a-f]{40}' "${workflow_files[@]}" \
              > "$OUT/workflows/framework-workflow-pin.txt" || echo "no reusable framework workflow pin found" > "$OUT/workflows/framework-workflow-pin.txt"
          else
            echo "no workflow files found" > "$OUT/workflows/framework-ref.txt"
            echo "no workflow files found" > "$OUT/workflows/framework-workflow-pin.txt"
          fi

          {
            echo "release_sha=${GITHUB_SHA}"
            echo "release_ref=${GITHUB_REF}"
            echo "repository=${GITHUB_REPOSITORY}"
            echo "run_id=${GITHUB_RUN_ID}"
          } > "$OUT/metadata.txt"

      - name: Render gate-results summary
        if: steps.type.outputs.type == 'framework'
        env:
          OUT: release-evidence
        run: |
          set -euo pipefail
          if [ ! -f "$OUT/.gate-results.tsv" ]; then
            exit 0
          fi
          {
            echo "## Release evidence - gate results"
            echo ""
            echo "| Gate | Result | Evidence |"
            echo "| --- | --- | --- |"
            while IFS=$'\t' read -r gate result evidence; do
              echo "| $gate | $result | \`$evidence\` |"
            done < "$OUT/.gate-results.tsv"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail failed framework evidence gates
        if: steps.type.outputs.type == 'framework'
        env:
          OUT: release-evidence
        run: |
          set -euo pipefail
          if grep -q $'\tfail\t' "$OUT/.gate-results.tsv"; then
            cat "$OUT/.gate-results.tsv"
            exit 1
          fi

      - name: Bundle evidence
        run: tar -czf release-evidence.tar.gz release-evidence/

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: release-evidence
          format: spdx-json
          output-file: release-evidence.spdx.json
          upload-artifact: false
          upload-release-assets: false
          dependency-snapshot: false

      - name: Attest release evidence provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: release-evidence.tar.gz

      - name: Attest release evidence SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: release-evidence.tar.gz
          sbom-path: release-evidence.spdx.json

      - name: Upload to workflow run
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-evidence
          path: |
            release-evidence.tar.gz
            release-evidence.spdx.json
          if-no-files-found: error

      - name: Attach to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "${TAG}" ] || [[ "${TAG}" == refs/* ]]; then
            echo "::warning::no release tag in context (TAG='${TAG}'); skipping release upload."
            exit 0
          fi
          gh release upload "${TAG}" release-evidence.tar.gz release-evidence.spdx.json
