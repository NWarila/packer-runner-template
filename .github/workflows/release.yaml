name: Release

# Optional release entrypoint for release-please and release evidence. Only
# adopted by runner consumers that publish versioned releases. Trusted-bot
# auto-merge lives in its own caller so pull_request_target stays isolated
# from release publishing paths.
#
# Taxonomy note: a Packer RUNNER is a data-only consumer and owns NO local
# `reusable-*.yaml`. Release evidence is therefore obtained by CALLING the
# Packer FRAMEWORK template's reusable
# (NWarila/packer-framework-template/.github/workflows/reusable-release-evidence.yaml)
# by SHA, with repo_type=runner. The framework reusable's runner path captures
# packer/repos + the pinned framework_ref and does NOT install or run Packer,
# so the required `packer_version` input is ignored on this path but must still
# be supplied to satisfy the workflow_call signature. See AUDIT-2026-05-28 and
# docs/explanation/architecture.md.

on:
  push:
    branches: [main]
  # Human-published releases still enter through this event. The normal
  # release-please path publishes with GITHUB_TOKEN, whose release events do
  # not cascade, so reusable-release-please.yaml dispatches `release-evidence`
  # explicitly after it creates a release.
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      task:
        description: Release task to run.
        required: true
        type: choice
        default: release-please
        options:
          - release-please
          - release-evidence

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref || github.run_id }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    # Push-triggered release-please needs the repository setting that allows
    # GitHub Actions to create pull requests. Keep that path opt-in so a fresh
    # template repo does not start with a red main check.
    if: ${{ (github.event_name == 'push' && vars.RELEASE_PLEASE_ON_PUSH == 'true') || (github.event_name == 'workflow_dispatch' && inputs.task == 'release-please') }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: write
    uses: NWarila/.github/.github/workflows/reusable-release-please.yaml@f25d8d5c0fdedca23671be7bfe635b66081bfeee

  evidence:
    name: Release Evidence
    if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.task == 'release-evidence') }}
    permissions:
      attestations: write
      contents: write
      id-token: write
    # Call the FRAMEWORK template's reusable by SHA — runners own no local copy.
    uses: NWarila/packer-framework-template/.github/workflows/reusable-release-evidence.yaml@7ecec6f9ccf4f11620f16a600bdae7e6e4db84cc
    with:
      # Ignored on the runner evidence path, but required by the reusable's
      # workflow_call signature. Renovate keeps it current for parity with the
      # framework's pinned Packer version.
      # renovate: datasource=github-releases depName=hashicorp/packer extractVersion=^v(?<version>.*)$
      packer_version: "1.15.0"
      repo_type: runner
