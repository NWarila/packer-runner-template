name: CI

# Self-validation for packer-runner-template. Initial pass: markdown lint and
# actionlint. Expanded in subsequent PRs to include contract validation,
# reusable workflow tests, and integration coverage.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Run actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          fail_level: error
          reporter: github-check

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@fa0cd0f1a052f54da593c83860f2292982f5d142 # v23.2.0
        with:
          globs: "**/*.md"

  contract:
    name: contract validator
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install pyyaml
        run: pip install --no-cache-dir pyyaml==6.0.3
      - name: Run contract self-validation (template type)
        run: |
          python tools/check_template_contract.py \
            --repo-root . \
            --contract contract/packer-runner-template-contract.yaml \
            --template-root . \
            --type template
      - name: Run contract test harness
        run: python tools/run_contract_tests.py

  mypy-advisory:
    name: mypy (advisory)
    # Type-check `tools/` to surface real regressions in static typing.
    # Advisory only — does not block merges. Use `::warning::` annotations
    # so findings are visible in PR review without failing the job.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install mypy
        run: pip install --no-cache-dir mypy==1.13.0 types-PyYAML==6.0.12.20240917
      - name: Run mypy (advisory)
        run: |
          python -m mypy --ignore-missing-imports tools/ \
            || echo "::warning::Mypy advisory reported findings (does not block merge)"

  cross-template-drift:
    name: cross-template drift
    # Enforces zero drift between this template's shape-shared regions
    # (validator core + harness skeleton) and the sibling runner template's
    # equivalent regions. Fails the job if a maintainer changed a shape-
    # shared section in this template without changing it in the sibling.
    # See docs/explanation/cross-template-sync.md.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      CROSS_TEMPLATE_SIBLING_REPO: NWarila/terraform-runner-template
      CROSS_TEMPLATE_SIBLING_REF: main
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Check cross-template drift
        run: python tools/check_cross_template_drift.py

  ruff-sarif:
    name: ruff (SARIF → Security tab)
    # Runs ruff with --output-format sarif so Python static-analysis findings
    # flow into the consumer's GitHub Security tab alongside CodeQL, Trivy,
    # Gitleaks, zizmor, and Scorecard. continue-on-error keeps Security-tab
    # publishing advisory. This thin runner has no hard ruff gate (and no
    # verify.py — that lives in the framework templates); actionlint and the
    # contract validator are this repo's hard CI gates.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install --no-cache-dir ruff==0.13.0
      - name: Run ruff with SARIF output
        continue-on-error: true
        run: ruff check --output-format sarif --output-file ruff.sarif tools/
      - name: Upload ruff SARIF
        if: always() && hashFiles('ruff.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          sarif_file: ruff.sarif
